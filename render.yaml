services:
  # Backend Web Service
  - type: web
    name: financewise-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this value manually in the Render Dashboard (Supabase connection string)

  # Frontend Static Site
  - type: web
    name: financewise-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://financewise-server.onrender.com/api" # Must include /api — the client appends route paths like /transactions directly
